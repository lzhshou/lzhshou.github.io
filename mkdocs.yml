site_name: APAAM Lab
repo_url: https://github.com/lzhshou/lzhshou.github.io
site_url: https://lzhshou.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - navigation.sections
    - header.autohide
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: switch to light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: switch to dark mode
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs/overrides

extra:
  alternate:
    - name: 中文
      link: /
      lang: zh
    - name: English 
      link: /en/
      lang: en
  copyright: >
    本网站由 AI 智能助手协助构建与维护 | 
    <a href="https://github.com/lzhshou/lzhshou.github.io">APAAM Lab</a>

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
          nav:
            - 主页: index.md
            - 人员: people/index.md
            - 研究: research/index.md
            - 发表: publications/index.md
            - 资源: resources/index.md
            - 教学: teaching/index.md
            - 关于: about/index.md
        - locale: en
          name: English
          build: true
          nav:
            - Home: index.md
            - People: people/index.md
            - Research: research/index.md
            - Publications: publications/index.md
            - Resources: resources/index.md
            - Teaching: teaching/index.md
            - About: about/index.md
  - search:
      lang: 
        - en
        - zh
  - bibtex:
      bib_file: "docs/refs.bib"
      cite_style: "pandoc"
      unescape_for_arithmatex: True
  - mkdocs-video:
      mark: "video-marker"
      css_style:
        width: "50vw"
        height: "57vh"

extra_javascript:
  - mathjax-config.js
  - https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML
  - '//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js'
  - javascripts/copy-button.js

extra_css:
  - stylesheets/copy-button.css
  - stylesheets/text-justify.css

markdown_extensions: 
  - pymdownx.arithmatex
  - attr_list
  - extra
  - fenced_code  
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

